[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Aggressively cache Next.js static chunks (content-hashed filenames = safe forever)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache media/video files for 1 day
[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Cache images and SVGs for 1 day
[[headers]]
  for = "/*.{jpg,jpeg,png,svg,gif,webp,avif,ico}"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Cache fonts for 1 year
[[headers]]
  for = "/*.{woff,woff2,ttf,otf}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
