<svg viewBox="0 0 110 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Upper cone: gray left -->
  <polygon points="54,5 20,60 54,52" fill="#B0BEC5"/>
  <!-- Upper cone: dark center strip -->
  <polygon points="51,5 47,52 57,52 54,5" fill="#1E293B"/>
  <!-- Upper cone: blue right -->
  <polygon points="54,5 88,60 54,52" fill="#2563EB"/>

  <!-- Brim / swoosh lines -->
  <path d="M6,63 Q54,46 102,63" stroke="#1E293B" stroke-width="3" stroke-linecap="round"/>
  <path d="M14,68 Q54,54 94,68" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Bottom left fin: gray -->
  <polygon points="20,60 2,107 34,98 54,73" fill="#90A4AE"/>
  <!-- Bottom center strip -->
  <polygon points="47,60 54,73 61,60" fill="#1E293B"/>
  <!-- Bottom right fin: blue -->
  <polygon points="88,60 108,107 76,98 54,73" fill="#2563EB" opacity="0.88"/>

  <!-- Signal arcs (upper right) -->
  <path d="M84,44 Q92,36 100,44" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M86,32 Q97,22 108,32" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" opacity="0.72"/>
  <path d="M88,20 Q102,8 116,20" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" opacity="0.44"/>
</svg>
